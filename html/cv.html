<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Mon CV - Mon Portfolio</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href=" /Portfolio/css/style.css">
        <link rel="icon" type="image/png" href="/Portfolio/assets/img/logo_G_White.ico">
        <script src=" /Portfolio/js/script.js" defer></script>
    </head>
    <body>
        <div id="header"></div>
        
        <main class="main-content">
            <h2 class="page-title">Curriculum Vitae</h2>
            
            <section class="cv-actions">
                <p class="cv-actions__text">
                    Consultez mon profil ci-dessous ou téléchargez-le au format PDF pour le garder sous la main.
                </p>
                <a href=" /Portfolio/assets/CV_GregoryWittmann.pdf" class="button button--primary cv-actions__btn" download>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Télécharger mon CV
                </a>
            </section>

            <section class="cv-viewer">
                <div class="cv-viewer__frame">
                    <a href="/Portfolio/assets/CV_GregoryWittmann.pdf" target="_blank">
                        <img 
                            src="/Portfolio/assets/cv-preview.png" 
                            alt="Aperçu du CV de Gregory Wittmann"
                            class="cv-viewer__image"
                        >
                    </a>
                </div>
            </section>
        </main>

        <div id="footer"></div>
    </body>
</html>
